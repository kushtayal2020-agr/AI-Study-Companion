<!DOCTYPE html>
<html>
       <head>
         <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Study Companion - personalized study plans, AI chatbot assistance, and productivity tools for students.">
    <title>AI-Study Companion</title>
    <!-- Google Fonts preconnect and import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
       </head>
    <body>
        <button class="theme-toggle" aria-label="Toggle theme" style="position: fixed; top: 14px; right: 14px; z-index: 1000; width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ddd; background:#fff; color:#333;"><i class="fas fa-sun"></i></button>
        <div class="background">
            <div class="login">
                
<form id="loginForm">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <br>

    <input type="password" id="password" placeholder="Password">
    <br>

    <button type="submit">Login</button>

    <p id="message"></p>

    <p class="signup-text">
        Don't have an account?
        <a href="signup.html">Sign up</a>
    </p>
</form>
        </div>
        </div>

    <script>
const form = document.getElementById("loginForm");
const message = document.getElementById("message");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    // Validation
    if (!email || !password) {
        showMessage("All fields are required", "red");
        return;
    }

    // Get users from localStorage
    let users = JSON.parse(localStorage.getItem("users")) || [];

    // Find user
    const user = users.find(u => u.email === email && u.password === password);

    if (!user) {
        showMessage("Invalid email or password", "red");
        return;
    }

    localStorage.setItem("currentUser", JSON.stringify(user));

    showMessage("Login successful 🎉", "green");

    setTimeout(() => {
        window.location.href = "dashboard.html"; // create this next
    }, 1000);
});

// Helper
function showMessage(msg, color) {
    message.textContent = msg;
    message.style.color = color;
}
</script>
<script src="theme.js"></script>
    </body>
</html>
