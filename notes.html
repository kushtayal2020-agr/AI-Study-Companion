<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Notes Generator</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #10142f, #1a2146);
    color: #edf2ff;
}

.app-wrap {
    display: flex;
    min-height: 100vh;
}

.sidebar {
    width: 260px;
    background: #0f1a33;
    border-right: 1px solid rgba(255, 255, 255, 0.08);
    padding: 30px 20px;
}

.sidebar h2 {
    margin-bottom: 18px;
    font-size: 20px;
    color: #7dd3fc;
}

.sidebar ul {
    list-style: none;
}

.sidebar ul a {
    text-decoration: none;
    color: #cbd5e1;
}

.sidebar ul li {
    margin-bottom: 12px;
    padding: 10px 8px;
    border-radius: 10px;
    transition: 0.2s;
    display: flex;
    align-items: center;
}

.sidebar ul li:hover {
    background: rgba(125, 211, 252, 0.2);
    color: white;
}

.main {
    flex: 1;
    padding: 24px;
}

.card {
    background: rgba(15, 25, 51, 0.8);
    border-radius: 18px;
    border: 1px solid rgba(125, 211, 252, 0.25);
    box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
    padding: 22px;
    max-width: 1000px;
    margin: 0 auto;
}

.card h2 {
    margin-bottom: 18px;
    font-size: 28px;
    color: #f8fafc;
}

.top-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
}

.top-row input,
.top-row select {
    flex: 1;
    min-width: 180px;
    border-radius: 11px;
    border: 1px solid rgba(148, 163, 184, 0.4);
    background: rgba(14, 24, 45, 0.75);
    color: #f8fafc;
    padding: 10px 12px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

textarea {
    width: 100%;
    min-height: 210px;
    border-radius: 12px;
    border: 1px solid rgba(148, 163, 184, 0.4);
    background: rgba(15, 25, 51, 0.7);
    color: #ebf4ff;
    padding: 12px;
    resize: vertical;
    font-size: 14px;
}

.buttons {
    margin-top: 12px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

button,
#saveKeyBtn {
    cursor: pointer;
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    background: linear-gradient(135deg, #38bdf8, #7c3aed);
    color: #fff;
    font-weight: 700;
    transition: transform 0.2s ease, opacity 0.2s ease;
}

button:hover,
#saveKeyBtn:hover {
    transform: translateY(-1px);
    opacity: 0.95;
}

.secondary {
    background: rgba(255, 255, 255, 0.14);
}

#loader {
    margin-top: 12px;
    font-size: 14px;
    color: #a5b4fc;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 1; }
}

@media (max-width: 1000px) {
    .sidebar { display: none; }
    .main { padding: 16px; }
    .grid { grid-template-columns: 1fr; }
}

@media (max-width: 620px) {
    .card { padding: 16px; }
    .top-row { flex-direction: column; }
    textarea { min-height: 170px; }
}
</style>
</head>

<body>

<div class="app-wrap">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>AI Study Companion</h2>
        <ul>
             <a href="index.html"><li>🏠 Home</li></a>
              <a href="planner.html"><li>📅 Planner</li></a>
              <a href="progress.html"><li>📊 Progress</li></a>
            <a href="notes.html"><li style="background:rgba(125,211,252,0.2);">📝 Notes</li></a>
                <a href="dashboard.html"><li>🏠 Dashboard</li></a>
            <a href="chatbot.html"><li>🤖 Chatbot</li></a>
                        
        </ul>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="card">

            <h2>📝 AI Notes Generator</h2>

            <div class="top-row">
                <input type="text" id="noteTitle" placeholder="Optional title">
                <select id="mode">
                    <option value="short">Short</option>
                    <option value="medium" selected>Medium</option>
                    <option value="detailed">Detailed</option>
                </select>
            </div>

            <div class="grid">

                <!-- Input -->
                <div>
                    <h3>Input</h3>
                    <br>
                    <textarea id="inputText" placeholder="Paste your content here..."></textarea>
                </div>

                <!-- Output -->
                <div>
                    <h3>Output</h3>
                    <br>
                    <textarea id="outputText" placeholder="AI notes will appear here..."></textarea>

                    <div class="buttons">
                        <button onclick="generateApiNotes()">Generate Notes</button>
                        <button onclick="improveNotes()">Improve Notes</button>
                        <button class="secondary" onclick="clearAll()">Clear</button>
                        <button onclick="copyNotes()">Copy</button>
                    </div>

                    <p id="loader" style="display:none;">🤖 Generating AI notes...</p>
                </div>

            </div>

        </div>
    </main>

</div>
<script src="auth.js"></script>
<script>
async function generateApiNotes() {
    const text = document.getElementById("inputText").value;
    const mode = document.getElementById("mode").value;

    if (!text) return alert("Enter content");

    const loader = document.getElementById("loader");
    loader.style.display = "block";

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: `Summarize this into ${mode} study notes:\n${text}`,
                subject: "Notes",
                history: []
            })
        });

        const data = await response.json();

        document.getElementById("outputText").value =
            data.reply || "No response from AI";

    } catch (error) {
        document.getElementById("outputText").value =
            "❌ Error: Make sure server is running";
    }

    loader.style.display = "none";
}

async function improveNotes() {
    const outputEl = document.getElementById("outputText");
    const text = outputEl.value.trim();

    if (!text) return alert("Generate or enter notes first");

    const loader = document.getElementById("loader");
    loader.style.display = "block";

    try {
        const response = await fetch("/improve-notes", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                text,
                history: []
            })
        });

        const data = await response.json();
        outputEl.value = data.reply || "No response from AI";
    } catch (error) {
        outputEl.value = "❌ Error: Unable to improve notes right now";
    }

    loader.style.display = "none";
}

function clearAll() {
    document.getElementById("inputText").value = "";
    document.getElementById("outputText").value = "";
}

function copyNotes() {
    let output = document.getElementById("outputText");
    output.select();
    document.execCommand("copy");
    alert("Copied!");
}
</script>

</body>
</html>
