<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Study Companion - personalized study plans, AI chatbot assistance, and productivity tools for students.">
    <title>AI-Study Companion</title>
    <!-- Google Fonts preconnect and import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <button class="theme-toggle" aria-label="Toggle theme" style="position: fixed; top: 14px; right: 14px; z-index: 1000; width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ddd; background:#fff; color:#333;"><i class="fas fa-sun"></i></button>

<form id="signupForm" class="signup">
<h1>Create Account</h1>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<input type="password" id="confirmPassword" placeholder="Confirm Password">

<select id="study-level">
<option value="">Select Study Level</option>
<option>School</option>
<option>College</option>
<option>Competitive Exams</option>
</select>

<div class="terms">
<input type="checkbox" id="terms"> I agree to Terms & Privacy Policy
</div>

<button type="submit">Create Account</button>

<p id="message"></p>

<p class="login-link">
Already have an account? <a href="login.html">Login</a>
</p>

</form>

<script>
const form = document.getElementById("signupForm");
const message = document.getElementById("message");

form.addEventListener("submit", function (e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const studyLevel = document.getElementById("study-level").value;
    const terms = document.getElementById("terms").checked;

    // Validation
    if (!name || !email || !password || !confirmPassword) {
        showMessage("All fields are required", "red");
        return;
    }

    if (!terms) {
        showMessage("Please accept Terms & Policy", "red");
        return;
    }

    if (!validateEmail(email)) {
        showMessage("Invalid email format", "red");
        return;
    }

    if (!validatePassword(password)) {
        showMessage("Password must be 6+ chars, include number & special character", "red");
        return;
    }

    if (password !== confirmPassword) {
        showMessage("Passwords do not match", "red");
        return;
    }

    
    let users = JSON.parse(localStorage.getItem("users")) || [];

    // Check duplicate
    if (users.some(user => user.email === email)) {
        showMessage("User already exists", "red");
        return;
    }

    
    const newUser = {
        name,
        email,
        password,
        studyLevel
    };

    
    users.push(newUser);

    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUser", JSON.stringify(newUser));

    showMessage("Account created successfully 🎉 Redirecting...", "green");

    // Redirect to dashboard so logged-in user sees profile state
    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 1200);
    form.reset();
});


function validateEmail(email) {
    return /^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email);
}

function validatePassword(password) {
    return /^(?=.*[0-9])(?=.*[!@#$%^&*]).{6,}$/.test(password);
}

function showMessage(msg, color) {
    message.textContent = msg;
    message.style.color = color;
}
</script>
<script src="theme.js"></script>

</body>
</html>
